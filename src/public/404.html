<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script type="text/javascript">
        // Redirect all non-root paths to index.html
        var path = window.location.pathname;
        window.location.replace(path === '/' ? '/index.html' : path);
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
